name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend-nestjs/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEVICE_API_KEY: ${{ secrets.DEVICE_API_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DB_PASSWORD,JWT_SECRET,DEVICE_API_KEY,DEPLOY_PATH,REPOSITORY
          script_stop: true
          script: |
            set -eu

            DEPLOY_DIR="${DEPLOY_PATH:-$HOME/DATN-Timekeeping}"
            REPO_URL="git@github.com:${REPOSITORY}.git"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            elif command -v docker-compose >/dev/null 2>&1; then
              compose() { docker-compose "$@"; }
            else
              echo "Docker Compose is not installed on VPS."
              exit 1
            fi

            cat > .env <<EOF
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DEVICE_API_KEY=${DEVICE_API_KEY}
            EOF

            compose pull postgres-db emqx-broker
            compose build backend
            compose up -d postgres-db emqx-broker
            compose run --rm backend npx prisma migrate deploy
            compose up -d --build backend
            compose ps
